<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Sanciones | Reskate Roleplay</title>
    <meta name="description" content="Calculadora avanzada de tiempos para el servidor Reskate Roleplay.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <div class="header-left">
                <div class="logo-container">
                    <img src="public/reskaterp.png" alt="Reskate Roleplay Logo" class="brand-logo">
                    <div class="brand-text">
                        <h1>RESKATE<span>RP</span></h1>
                        <p class="subtitle">Gestión de Sanciones Administrativas</p>
                    </div>
                </div>
            </div>
        </header>

        <main>
            <section class="calculator-container">
                <div class="controls-row">
                    <div class="search-wrapper">
                        <input type="text" id="rule-search" placeholder="Buscar infracción (ej: VDM, MG, Robo...)" autocomplete="off">
                        <div class="search-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        </div>
                    </div>

                    <div class="filters">
                        <button class="filter-btn active" data-filter="all">Todos</button>
                        <button class="filter-btn" data-filter="jail">Jail</button>
                        <button class="filter-btn" data-filter="ban">Baneo</button>
                    </div>
                </div>

                <div class="content-grid">
                    <div class="rules-list-container">
                        <div id="rules-list" class="rules-list">
                            <!-- Rules injected by JS -->
                        </div>
                    </div>

                    <aside class="summary-panel">
                        <div class="summary-card">
                            <h3>Generador de Comando</h3>
                            
                            <div class="input-group">
                                <label for="user-id">ID del Jugador</label>
                                <input type="number" id="user-id" placeholder="Ej: 12" min="1">
                            </div>

                            <div class="selected-items" id="selected-items">
                                <p class="empty-msg">No hay infracciones seleccionadas</p>
                            </div>
                            
                            <div class="total-section">
                                <div class="total-row">
                                    <span>Total Acumulado</span>
                                    <span id="total-time-raw" class="raw-value">0 min</span>
                                </div>
                                <div class="total-display" id="total-display">
                                    00:00:00
                                </div>
                                <div class="total-human" id="total-human">
                                    Selecciona una infracción
                                </div>
                            </div>

                            <div class="actions">
                                <button id="clear-btn" class="secondary-btn">Limpiar</button>
                                <button id="copy-btn" class="primary-btn">Copiar /jail</button>
                            </div>
                        </div>
                    </aside>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 Reskate Roleplay - Herramienta de Administración</p>
        </footer>
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
